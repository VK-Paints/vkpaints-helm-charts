image:
  repository: ghcr.io/vk-paints/vkpaints-notification-service
  tag: latest
  pullPolicy: IfNotPresent
replicas: 2
service:
  port: 80

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
    - labelSelector:
        matchLabels:
          app: notification-service
      topologyKey: "kubernetes.io/hostname"

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

# notification-service is a pure RabbitMQ worker — no HTTP server.
# Probes are disabled; Kubernetes restart policy handles crashes.
livenessProbe: {}
readinessProbe: {}
