image:
  repository: ghcr.io/vk-paints/vkpaints-order-service
  tag: latest
service:
  targetPort: 3004
db:
  url: "postgres://postgres:postgres@postgres:5432/order_db"
rabbitmq:
  url: "amqp://guest:guest@rabbitmq:5672"
replicas: 2
env:
  NODE_ENV: "development"
httproute:
  namespace: vkpaints-dev-ns
  hostname: dev.vkcolors.shop
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchLabels:
            app: order-service
        topologyKey: "kubernetes.io/hostname"
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi
livenessProbe:
  enabled: true
  httpGet:
    path: /health
    port: 3004
  initialDelaySeconds: 15
  periodSeconds: 20
readinessProbe:
  enabled: true
  httpGet:
    path: /health
    port: 3004
  initialDelaySeconds: 5
  periodSeconds: 10

startupProbe:
  enabled: true
  httpGet:
    path: /health
    port: 3004
  failureThreshold: 30
  periodSeconds: 10

initContainers:
  - name: wait-for-postgres
    image: busybox:1.28
    command: ['sh', '-c', 'until nc -zv postgres.vkpaints-dev-ns.svc.cluster.local 5432; do echo waiting for postgres; sleep 2; done;']
  - name: wait-for-rabbitmq
    image: busybox:1.28
    command: ['sh', '-c', 'until nc -zv rabbitmq.vkpaints-dev-ns.svc.cluster.local 5672; do echo waiting for rabbitmq; sleep 2; done;']
