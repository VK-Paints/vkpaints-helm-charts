apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Chart.Name }}-route
  namespace: {{ .Values.httproute.namespace }}
spec:
  parentRefs:
  - name: {{ .Values.httproute.gatewayName }}
    namespace: {{ .Values.httproute.gatewayNamespace }}
  hostnames:
  - {{ .Values.httproute.hostname | quote }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: {{ .Values.httproute.path }}
    backendRefs:
    - name: {{ .Chart.Name }}
      port: {{ .Values.service.port }}
