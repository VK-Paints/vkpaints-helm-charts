image:
  repository: ghcr.io/vk-paints/vkpaints-user-service
  tag: v1.0.0
replicas: 2
env:
  NODE_ENV: "production"
httproute:
  namespace: vkpaints-prod-ns
  hostname: vkcolors.shop
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app: user-service
          topologyKey: "kubernetes.io/hostname"
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi
livenessProbe:
  enabled: true
  httpGet:
    path: /health
    port: 3001
  initialDelaySeconds: 15
  periodSeconds: 20
readinessProbe:
  enabled: true
  httpGet:
    path: /health
    port: 3001
  initialDelaySeconds: 5
  periodSeconds: 10
startupProbe:
  enabled: true
  httpGet:
    path: /health
    port: 3001
  failureThreshold: 30
  periodSeconds: 10
initContainers: []
