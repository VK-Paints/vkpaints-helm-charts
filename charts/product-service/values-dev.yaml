image:
  repository: ghcr.io/vk-paints/vkpaints-product-service
  tag: latest
service:
  targetPort: 3002
db:
  url: "postgres://postgres:postgres@postgres:5432/product_db"
replicas: 2
env:
  NODE_ENV: "development"
httproute:
  namespace: vkpaints-dev-ns
  hostname: dev.vkcolors.shop
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app: product-service
          topologyKey: "kubernetes.io/hostname"
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi
livenessProbe:
  enabled: true
  httpGet:
    path: /health
    port: 3002
  initialDelaySeconds: 15
  periodSeconds: 20
readinessProbe:
  enabled: true
  httpGet:
    path: /health
    port: 3002
  initialDelaySeconds: 5
  periodSeconds: 10

startupProbe:
  enabled: true
  httpGet:
    path: /health
    port: 3002
  failureThreshold: 30
  periodSeconds: 10

initContainers: []
