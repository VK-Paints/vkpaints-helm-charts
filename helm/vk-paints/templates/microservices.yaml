{{- range $key, $service := .Values.microservices }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $key }}-config
  namespace: {{ $.Values.global.namespace }}
data:
  {{- range $envKey, $envVal := $service.env }}
  {{ $envKey }}: {{ $envVal | quote }}
  {{- end }}
---
{{- if $service.secrets }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $key }}-secret
  namespace: {{ $.Values.global.namespace }}
type: Opaque
stringData:
  {{- range $secKey, $secVal := $service.secrets }}
  {{ $secKey }}: {{ $secVal | quote }}
  {{- end }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $key }}-deploy
  namespace: {{ $.Values.global.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ $key }}-service
  template:
    metadata:
      labels:
        app: {{ $key }}-service
    spec:
      {{- if $.Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml $.Values.global.imagePullSecrets | nindent 8 }}
      {{- end }}
      containers:
      - name: {{ $key }}-container
        image: {{ $service.image }}
        imagePullPolicy: IfNotPresent
        envFrom:
        - configMapRef:
            name: {{ $key }}-config
        {{- if $service.secrets }}
        - secretRef:
            name: {{ $key }}-secret
        {{- end }}
        ports:
        - containerPort: {{ $service.port }}
        {{- if ne $key "notification" }}
        livenessProbe:
          httpGet:
            path: {{ if eq $key "frontend" }}/{{ else }}/health{{ end }}
            port: {{ $service.port }}
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: {{ if eq $key "frontend" }}/{{ else }}/health{{ end }}
            port: {{ $service.port }}
          initialDelaySeconds: 5
          periodSeconds: 10
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $key }}-service
  namespace: {{ $.Values.global.namespace }}
spec:
  selector:
    app: {{ $key }}-service
  ports:
  - port: 80
    targetPort: {{ $service.port }}
    protocol: TCP
  type: ClusterIP
---
{{- if ne $key "notification" }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $key }}-route
  namespace: {{ $.Values.global.namespace }}
spec:
  parentRefs:
  - name: vk-paints-gateway
    namespace: {{ $.Values.global.gatewayNamespace }}
  rules:
  - matches:
    - path:
        {{- if eq $key "frontend" }}
        type: PathPrefix
        value: /
        {{- else if eq $key "quotation" }}
        type: PathPrefix
        value: /quotes
        {{- else }}
        type: PathPrefix
        value: /{{ $key }}s
        {{- end }}
    {{- if ne $key "frontend" }}
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /
    {{- end }}
    backendRefs:
    - name: {{ $key }}-service
      port: 80
---
{{- end }}
{{- if and (eq $key "frontend") $.Values.global.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ $key }}-hpa
  namespace: {{ $.Values.global.namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ $key }}-deploy
  minReplicas: {{ $.Values.global.hpa.minReplicas }}
  maxReplicas: {{ $.Values.global.hpa.maxReplicas }}
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: {{ $.Values.global.hpa.targetCPU }}
---
{{- end }}
{{- end }}
