{{- if .Values.argocd.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-route
  namespace: argocd
spec:
  parentRefs:
  - name: {{ .Values.global.gatewayName | default "vkpaints-gateway" }}
    namespace: {{ .Values.global.gatewayNamespace | default "vkpaints-gateway-ns" }}
  hostnames:
  - {{ .Values.argocd.hostname | quote }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: argocd-server
      port: 80
{{- end }}
